<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord | Evadion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            height: 100vh;
            background: #000;
        }
        
        #proxy-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
        
        #proxy-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        
        .proxy-btn {
            padding: 8px 15px;
            background: #5865F2;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .proxy-btn:hover {
            background: #4752C4;
        }
        
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 24px;
        }
        
        .spinner {
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 5px solid #5865F2;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-right: 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Loading Discord Proxy...</div>
    </div>
    
    <iframe id="proxy-frame" src="about:blank" allow="microphone; camera"></iframe>
    
    <div id="proxy-controls">
        <button class="proxy-btn" onclick="reloadFrame()">Reload</button>
        <button class="proxy-btn" onclick="toggleFullscreen()">Fullscreen</button>
    </div>
    
    <script>
        
        const proxyUrls = [
            "https://discord.com",
            "https://discordapp.com",
            "https://canary.discord.com"
        ];
        
        let currentProxyIndex = 0;
        
      
        function loadProxyFrame() {
            const frame = document.getElementById('proxy-frame');
            const loading = document.getElementById('loading');
            
           
            const proxyUrl = `https://cors-anywhere.herokuapp.com/${proxyUrls[currentProxyIndex]}`;
           
            
            frame.src = proxyUrl;
            
            frame.onload = function() {
                setTimeout(() => {
                    loading.style.display = 'none';
                }, 1000);
            };
            
            frame.onerror = function() {
 
                currentProxyIndex = (currentProxyIndex + 1) % proxyUrls.length;
                loadProxyFrame();
            };
        }
        
 
        function reloadFrame() {
            document.getElementById('loading').style.display = 'flex';
            loadProxyFrame();
        }
        
 
        function toggleFullscreen() {
            const elem = document.getElementById('proxy-frame');
            
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) {
                    elem.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
        
 
        document.addEventListener('DOMContentLoaded', loadProxyFrame);
        
 
        setInterval(reloadFrame, 300000);
    </script>
</body>
</html>

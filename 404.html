<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Evadion</title>
 
    <link rel="icon" href="/logo/evadion.jpeg" type="image/png">
 
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow-x: hidden;
            background: #0a0a14;
            position: relative;
            perspective: 1000px;
            color: #fff;
        }

 
        .gradient-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                circle at 50% 70%,
                rgba(90, 68, 255, 0.6) 0%,
                rgba(40, 30, 120, 0.3) 30%,
                rgba(15, 15, 40, 0.1) 60%,
                rgba(10, 10, 20, 0) 80%
            );
            transform-style: preserve-3d;
            transform: translateZ(0);
            animation: pulse 8s ease-in-out infinite;
            z-index: -10;
        }

        .depth-layer {
            position: fixed;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 30% 40%, rgba(80, 60, 255, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 70% 60%, rgba(100, 80, 255, 0.08) 0%, transparent 40%);
            filter: blur(40px);
            opacity: 0;
            animation: depthPulse 12s ease-in-out infinite;
            z-index: -9;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 150px 60px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            z-index: -7;
        }

 
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -5;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite ease-in-out;
            opacity: 0;
        }

 
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 8%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            transition: all 0.3s ease;
            background-color: rgba(15, 15, 40, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(90, 68, 255, 0.2);
        }

        .nav-scrolled {
            padding: 1rem 8%;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            background-color: rgba(15, 15, 40, 0.95);
        }

        .logo {
            display: flex;
            align-items: center;
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff, #5a44ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        .logo img {
            height: 40px;
            width: 40px;
            margin-right: 0.75rem;
            border-radius: 50%;
            object-fit: contain;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            position: relative;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            padding: 0.5rem 0;
        }

        .nav-links a:hover {
            color: #5a44ff;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: #5a44ff;
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

 
        .error-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 0 8%;
            margin-top: 80px; 
        }

        .error-code {
            font-size: 10rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #5a44ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .error-message {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .button-group {
            display: flex;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .cta-button, .secondary-button {
            padding: 1rem 2rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .cta-button {
            background: linear-gradient(135deg, #5a44ff, #7a64ff);
            color: white;
            border: none;
        }

        .secondary-button {
            background: transparent;
            border: 2px solid #5a44ff;
            color: #fff;
        }

        .cta-button:hover, .secondary-button:hover {
            transform: translateY(-3px);
        }

        .cta-button:hover {
            box-shadow: 0 10px 20px rgba(90, 68, 255, 0.3);
        }

        .secondary-button:hover {
            background: rgba(90, 68, 255, 0.1);
        }

        .tooltip {
            position: absolute;
            background: rgba(10, 10, 20, 0.9);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            font-size: 0.8rem;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(90, 68, 255, 0.3);
        }

        .tooltip::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            width: 10px;
            height: 10px;
            background: rgba(10, 10, 20, 0.9);
            border-top: 1px solid rgba(90, 68, 255, 0.3);
            border-left: 1px solid rgba(90, 68, 255, 0.3);
        }

        .has-tooltip {
            position: relative;
        }

        .has-tooltip:hover .tooltip {
            transform: translateX(-50%) scale(1);
            opacity: 1;
            bottom: -45px;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.6;
                filter: blur(30px) brightness(0.8);
                transform: translateZ(-20px) scale(0.9);
            }
            50% {
                opacity: 1;
                filter: blur(20px) brightness(1.2);
                transform: translateZ(0) scale(1);
            }
        }

        @keyframes depthPulse {
            0%, 100% { opacity: 0.3; transform: translateZ(-50px); }
            50% { opacity: 0.8; transform: translateZ(30px); }
        }

        @media screen and (max-width: 768px) {
            .error-code {
                font-size: 6rem;
            }
            .error-message {
                font-size: 1.5rem;
            }
            .button-group {
                flex-direction: column;
                gap: 1rem;
            }
            .nav-links {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="depth-layer"></div>
    <div class="stars" id="stars"></div>
    <div class="vignette"></div>

    <nav id="navbar">
        <a href="/" class="logo">
            <img src="/logo/evadion.jpeg" alt="Evadion Logo"> Evadion
        </a>
        <div class="nav-links">
            <a class="nav-link has-tooltip" href="/engine">
                PRO_Y
                <span class="tooltip">Proxy</span>
            </a>
            <a href="/audio" class="nav-link has-tooltip">
                Music
                <span class="tooltip">Music</span>
            </a>
            <a href="/movies" class="nav-link has-tooltip">
                TV
                <span class="tooltip">Movies + Shows</span>
            </a>
            <a class="nav-link has-tooltip" href="/ai">
                AI
                <span class="tooltip">AI</span>
            </a>
            <a class="nav-link has-tooltip" href="/extras">
                Extras
                <span class="tooltip">Extras</span>
            </a>
        </div>
        <div class="nav-buttons">
            <a href="https://twitter.com" class="social-link has-tooltip" target="_blank">
                <i class="bi bi-twitter-x"></i>
                <span class="tooltip">Twitter</span>
            </a>
            <a href="https://instagram.com" class="social-link has-tooltip" target="_blank">
                <i class="bi bi-instagram"></i>
                <span class="tooltip">Instagram</span>
            </a>
            <a href="mailto:contact.mkykg@gmail.com" class="cta-button">
                Email
                <i class="bi bi-arrow-right"></i>
            </a>
        </div>
    </nav>

    <div class="error-container">
        <h1 class="error-code">404</h1>
        <p class="error-message">The page you're looking for doesn't exist.</p>
        <div class="button-group">
            <button onclick="goBack()" class="secondary-button">
                <i class="bi bi-arrow-left"></i>
                Go Back
            </button>
            <a href="/" class="cta-button">
                Go Home
                <i class="bi bi-house-door"></i>
            </a>
        </div>
    </div>

    <script>
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 50;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                const size = Math.random() * 3;
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const duration = 2 + Math.random() * 3;
                const delay = Math.random() * 5;
                
                star.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${x}%;
                    top: ${y}%;
                    --duration: ${duration}s;
                    animation-delay: ${delay}s;
                `;
                
                starsContainer.appendChild(star);
            }
        }

        function navbarScroll() {
            const navbar = document.getElementById('navbar');
            navbar.classList.toggle('nav-scrolled', window.scrollY > 100);
        }


        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = '/';
            }
        }


        document.addEventListener('DOMContentLoaded', () => {
            createStars();
            window.addEventListener('scroll', navbarScroll);
        });


        function parallaxEffect(e) {
            const xPos = (window.innerWidth / 2 - e.clientX) / 50;
            const yPos = (window.innerHeight / 2 - e.clientY) / 50;

            document.querySelector('.gradient-bg').style.transform =
                `translateZ(0) rotateX(${yPos}deg) rotateY(${-xPos}deg)`;

            document.querySelector('.depth-layer').style.transform =
                `translateZ(-50px) rotateX(${yPos * 1.5}deg) rotateY(${-xPos * 1.5}deg)`;
        }

        document.addEventListener('mousemove', parallaxEffect);


        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                if (e.beta && e.gamma) {
                    parallaxEffect({
                        clientX: window.innerWidth / 2 - (e.gamma * 5),
                        clientY: window.innerHeight / 2 - (e.beta * 5)
                    });
                }
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evadion</title>

    <link rel="icon" href="/logo/favicon.png" type="image/png">
    <link rel="mask-icon" href="/logo/favicon.png" color="#5a44ff">

    <link rel="shortcut icon" href="/logo/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="gradient-bg"></div>
    <div class="depth-layer"></div>
    <div class="stars" id="stars"></div>
    <div class="vignette"></div>


    <nav id="navbar">
        <a href="/" class="logo">
            <img src="/logo/evadion.png" alt="Evadion Logo"> Evadion
        </a>
        <div class="nav-links">
            <a class="nav-link has-tooltip" href="/engine">
                PRO_Y
                <span class="tooltip">Proxy</span>
            </a>
            <a href="/movies" class="nav-link has-tooltip">
                TV
                <span class="tooltip">Movies + Shows</span>
            </a>
            <a class="nav-link has-tooltip" href="/ai">
                AI
                <span class="tooltip">AI</span>
            </a>
            <a class="nav-link has-tooltip" href="/extras">
                Extras
                <span class="tooltip">Extras</span>
            </a>
        </div>
        <div class="nav-buttons">
            <a href="https://twitter.com" class="social-link has-tooltip" target="_blank">
                <i class="bi bi-twitter-x"></i>
                <span class="tooltip">Twitter</span>
            </a>
            <a href="https://instagram.com" class="social-link has-tooltip" target="_blank">
                <i class="bi bi-instagram"></i>
                <span class="tooltip">Instagram</span>
            </a>
            <a href="mailto:contact@evadion.com" class="cta-button">
                Email
                <i class="bi bi-arrow-right"></i>
            </a>
        </div>
    </nav>


    <section class="hero">
        <div class="hero-content">
            <h1>Evadion <span class="highlight">Digital v1</span></h1>
            <p>
                <span class="txt-rotate" data-period="2000" data-rotate='[ "From gamers.", "By gamers.", "To gamers.", "For gamers." ]'></span>
            </p>
            <div class="hero-buttons">
                <a href="/apk" class="cta-button">
                    Apps
                    <i class="bi bi-grid-3x3-gap-fill"></i>
                </a>
                <a href="/gms" class="secondary-button">
                    Games
                    <i class="bi bi-arrow-right"></i>
                </a>
            </div>
        </div>
        <footer>&copy; 2025 Evadion. All rights reserved.</footer>
    </section>


    <script src="index.js"></script>
</body>
</html>
